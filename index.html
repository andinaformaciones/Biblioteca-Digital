<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: white;
  background: linear-gradient(135deg, #10243d, #3b4b63, #8b1e3f);
  background-size: 300% 300%;
  animation: fondoAnimado 20s ease infinite;
}

@keyframes fondoAnimado {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* BOTÓN VOLVER */
.boton-volver {
  position: absolute;
  top: 20px;
  left: 20px;
  text-decoration: none;
  color: #ffffff;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.08);
  padding: 8px 14px;
  border-radius: 8px;
  backdrop-filter: blur(6px);
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.15);
  z-index: 10;
}

.boton-volver:hover {
  background: rgba(255,255,255,0.18);
  transform: translateX(-3px);
}

/* HEADER */
header {
  text-align: center;
  padding: 50px 20px 20px;
  animation: aparecer 1.5s ease forwards;
  opacity: 0;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

header img {
  height: 70px;
  margin-bottom: 15px;
}

/* CONTENIDO */
.contenedor {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  padding: 20px;
}

/* BUSCADOR ORIGINAL */
.buscador input {
  width: 100%;
  padding: 12px 16px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 25px;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  padding: 14px;
  width: 250px;
  cursor: pointer;
  border-top: 5px solid #8b1e3f;
}

.thumb {
  width: 55px;
  height: 70px;
  border-radius: 6px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.thumb.pdf { background: #8b1e3f; }
.thumb.video { background: #1e5799; }

.meta h3 { color: #0f2d47; margin: 0; font-size: 15px; }
.meta p { color: #555; font-size: 13px; }

/* MODAL */
.modal {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}

.modal.active {
  opacity:1;
  pointer-events:all;
}

.modal-content {
  background:#fff;
  width:90%;
  max-width:900px;
  border-radius:10px;
}

.modal iframe {
  width:100%;
  height:80vh;
  border:none;
}

.modal-header {
  background:#7b1f31;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* RESPONSIVE */
@media (max-width:600px){
  .boton-volver {
    font-size:13px;
    padding:6px 10px;
  }
}
</style>
</head>

const grid = document.getElementById('libraryGrid');
const input = document.getElementById('filterInput');
const modal = document.getElementById('modalViewer');
const iframe = document.getElementById('modalIframe');
const closeModal = document.getElementById('closeModal');
const title = document.getElementById('modalTitle');

function render(list){
  grid.innerHTML='';
  list.forEach(f=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <div class="thumb ${f.type}">${f.type.toUpperCase()}</div>
      <div class="meta">
        <h3>${f.title}</h3>
        <p>Vista previa embebida</p>
      </div>`;
    el.onclick=()=>{
      modal.classList.add('active');
      iframe.src=`https://drive.google.com/file/d/${f.id}/preview`;
      title.textContent=f.title;
    };
    grid.appendChild(el);
  });
}

render(files);

input.oninput=e=>{
  const q=e.target.value.toLowerCase();
  render(files.filter(f=>f.title.toLowerCase().includes(q)));
};

closeModal.onclick=()=>{
  modal.classList.remove('active');
  iframe.src='';
};
